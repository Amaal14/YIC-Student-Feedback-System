<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="center-box auth-wrapper">
    <section class="card auth-card">
      <img src="logo.png.png" alt="YIC Logo" class="auth-logo">

      <h2>Create Account</h2>
      <p class="form-help">New accounts are registered as student accounts</p>

      <form onsubmit="return registerUser(event)">
        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" placeholder="Enter your full name" required>

        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="Enter your email" required>

        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="Enter your password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required>

        <button type="submit">Create Account</button>
      </form>

      <p>Already have an account? <a href="login.html">Login here</a></p>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    redirectLoggedInUser();
  </script>
</body>
</html>
